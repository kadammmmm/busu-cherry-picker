version: '3.8'

services:
  # =============================================================================
  # Cherry Picker Application
  # =============================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cherry-picker
    ports:
      - "${PORT:-5000}:5000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=5000
      - HOST_URI=${HOST_URI:-http://localhost:5000}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://desktop.wxcc-us1.cisco.com,https://desktop.wxcc-eu1.cisco.com}
      - CACHE_TTL=${CACHE_TTL:-3600}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - cherry-picker-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =============================================================================
  # Redis (Optional - for distributed caching in multi-instance deployments)
  # =============================================================================
  redis:
    image: redis:7-alpine
    container_name: cherry-picker-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - cherry-picker-network
    profiles:
      - distributed

  # =============================================================================
  # Nginx Reverse Proxy (Optional - for SSL termination)
  # =============================================================================
  nginx:
    image: nginx:alpine
    container_name: cherry-picker-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - cherry-picker-network
    profiles:
      - production

networks:
  cherry-picker-network:
    driver: bridge

volumes:
  redis-data:
    driver: local
